<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Kanban Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: white;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
        }

        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .column {
            background: rgba(255,255,255,0.95);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            min-height: 500px;
        }

        .column-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .column-title {
            font-size: 1.2rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .column-count {
            background: #e0e0e0;
            color: #666;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .column.todo .column-title { color: #f59e0b; }
        .column.in-progress .column-title { color: #3b82f6; }
        .column.done .column-title { color: #10b981; }

        .add-btn {
            background: #f0f0f0;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            color: #666;
            transition: all 0.2s;
        }

        .add-btn:hover {
            background: #e0e0e0;
            transform: scale(1.1);
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            cursor: grab;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .card:hover {
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            transform: translateY(-2px);
        }

        .card.dragging {
            opacity: 0.5;
            transform: rotate(3deg);
        }

        .card-title {
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 1rem;
        }

        .card-desc {
            color: #666;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 12px;
        }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .card-tags {
            display: flex;
            gap: 6px;
        }

        .tag {
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 500;
        }

        .tag.design { background: #fce7f3; color: #be185d; }
        .tag.dev { background: #dbeafe; color: #1e40af; }
        .tag.bug { background: #fee2e2; color: #991b1b; }
        .tag.feature { background: #d1fae5; color: #065f46; }

        .card-actions {
            display: flex;
            gap: 8px;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .card:hover .card-actions {
            opacity: 1;
        }

        .action-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            color: #999;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: #f0f0f0;
            color: #666;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 16px;
            padding: 28px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .modal-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #555;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 24px;
        }

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .drop-zone {
            min-height: 100px;
            border-radius: 8px;
            border: 2px dashed transparent;
            transition: all 0.2s;
        }

        .drop-zone.drag-over {
            border-color: #667eea;
            background: rgba(102, 126, 234, 0.05);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
            font-size: 0.95rem;
        }

        .export-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: white;
            border: none;
            padding: 14px 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            cursor: pointer;
            font-weight: 600;
            color: #667eea;
            transition: all 0.2s;
        }

        .export-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 24px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 Project Kanban</h1>
        <p>Drag cards between columns to update status</p>
    </div>

    <div class="board">
        <div class="column todo" data-column="todo">
            <div class="column-header">
                <div class="column-title">
                    📝 To Do
                    <span class="column-count">0</span>
                </div>
                <button class="add-btn" onclick="openModal('todo')">+</button>
            </div>
            <div class="cards drop-zone" id="todo-cards"></div>
        </div>

        <div class="column in-progress" data-column="in-progress">
            <div class="column-header">
                <div class="column-title">
                    ⚡ In Progress
                    <span class="column-count">0</span>
                </div>
                <button class="add-btn" onclick="openModal('in-progress')">+</button>
            </div>
            <div class="cards drop-zone" id="in-progress-cards"></div>
        </div>

        <div class="column done" data-column="done">
            <div class="column-header">
                <div class="column-title">
                    ✅ Done
                    <span class="column-count">0</span>
                </div>
                <button class="add-btn" onclick="openModal('done')">+</button>
            </div>
            <div class="cards drop-zone" id="done-cards"></div>
        </div>
    </div>

    <button class="export-btn" onclick="exportData()">💾 Save to File</button>

    <div class="modal" id="cardModal">
        <div class="modal-content">
            <h2 class="modal-title" id="modalTitle">Add Task</h2>
            <form id="cardForm">
                <div class="form-group">
                    <label for="cardTitle">Title</label>
                    <input type="text" id="cardTitle" required placeholder="Enter task title...">
                </div>
                <div class="form-group">
                    <label for="cardDesc">Description</label>
                    <textarea id="cardDesc" placeholder="Add details..."></textarea>
                </div>
                <div class="form-group">
                    <label for="cardTag">Tag</label>
                    <select id="cardTag">
                        <option value="feature">✨ Feature</option>
                        <option value="bug">🐛 Bug</option>
                        <option value="design">🎨 Design</option>
                        <option value="dev">💻 Development</option>
                    </select>
                </div>
                <input type="hidden" id="cardColumn" value="">
                <input type="hidden" id="cardId" value="">
                <div class="modal-actions">
                    <button type="button" class="btn btn-secondary" onclick="closeModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data storage
        let cards = JSON.parse(localStorage.getItem('kanbanCards')) || [];
        let editingCardId = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderCards();
            setupDragAndDrop();
        });

        // Render all cards
        function renderCards() {
            const columns = ['todo', 'in-progress', 'done'];
            
            columns.forEach(column => {
                const container = document.getElementById(`${column}-cards`);
                const columnCards = cards.filter(c => c.column === column);
                
                // Update count
                const columnEl = document.querySelector(`[data-column="${column}"]`);
                columnEl.querySelector('.column-count').textContent = columnCards.length;
                
                if (columnCards.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            No tasks yet<br>
                            <small>Click + to add one</small>
                        </div>
                    `;
                } else {
                    container.innerHTML = columnCards.map(card => createCardHTML(card)).join('');
                }
            });
            
            setupDragAndDrop();
        }

        // Create card HTML
        function createCardHTML(card) {
            return `
                <div class="card" draggable="true" data-id="${card.id}">
                    <div class="card-title">${escapeHtml(card.title)}</div>
                    ${card.desc ? `<div class="card-desc">${escapeHtml(card.desc)}</div>` : ''}
                    <div class="card-meta">
                        <div class="card-tags">
                            <span class="tag ${card.tag}">${getTagLabel(card.tag)}</span>
                        </div>
                        <div class="card-actions">
                            <button class="action-btn" onclick="editCard('${card.id}')" title="Edit">✏️</button>
                            <button class="action-btn" onclick="deleteCard('${card.id}')" title="Delete">🗑️</button>
                        </div>
                    </div>
                </div>
            `;
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Get tag label
        function getTagLabel(tag) {
            const labels = {
                feature: '✨ Feature',
                bug: '🐛 Bug',
                design: '🎨 Design',
                dev: '💻 Dev'
            };
            return labels[tag] || tag;
        }

        // Open modal
        function openModal(column, cardId = null) {
            editingCardId = cardId;
            document.getElementById('cardColumn').value = column;
            document.getElementById('modalTitle').textContent = cardId ? 'Edit Task' : 'Add Task';
            
            if (cardId) {
                const card = cards.find(c => c.id === cardId);
                document.getElementById('cardTitle').value = card.title;
                document.getElementById('cardDesc').value = card.desc || '';
                document.getElementById('cardTag').value = card.tag;
            } else {
                document.getElementById('cardTitle').value = '';
                document.getElementById('cardDesc').value = '';
                document.getElementById('cardTag').value = 'feature';
            }
            
            document.getElementById('cardModal').classList.add('active');
            document.getElementById('cardTitle').focus();
        }

        // Close modal
        function closeModal() {
            document.getElementById('cardModal').classList.remove('active');
            editingCardId = null;
        }

        // Handle form submit
        document.getElementById('cardForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const title = document.getElementById('cardTitle').value.trim();
            const desc = document.getElementById('cardDesc').value.trim();
            const tag = document.getElementById('cardTag').value;
            const column = document.getElementById('cardColumn').value;
            
            if (editingCardId) {
                const card = cards.find(c => c.id === editingCardId);
                card.title = title;
                card.desc = desc;
                card.tag = tag;
            } else {
                cards.push({
                    id: Date.now().toString(),
                    title,
                    desc,
                    tag,
                    column,
                    createdAt: new Date().toISOString()
                });
            }
            
            saveCards();
            renderCards();
            closeModal();
        });

        // Edit card
        function editCard(id) {
            const card = cards.find(c => c.id === id);
            openModal(card.column, id);
        }

        // Delete card
        function deleteCard(id) {
            if (confirm('Delete this task?')) {
                cards = cards.filter(c => c.id !== id);
                saveCards();
                renderCards();
            }
        }

        // Save to localStorage
        function saveCards() {
            localStorage.setItem('kanbanCards', JSON.stringify(cards));
        }

        // Setup drag and drop
        function setupDragAndDrop() {
            const draggables = document.querySelectorAll('.card');
            const dropZones = document.querySelectorAll('.drop-zone');
            
            draggables.forEach(draggable => {
                draggable.addEventListener('dragstart', () => {
                    draggable.classList.add('dragging');
                });
                
                draggable.addEventListener('dragend', () => {
                    draggable.classList.remove('dragging');
                    dropZones.forEach(zone => zone.classList.remove('drag-over'));
                });
            });
            
            dropZones.forEach(zone => {
                zone.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    zone.classList.add('drag-over');
                });
                
                zone.addEventListener('dragleave', () => {
                    zone.classList.remove('drag-over');
                });
                
                zone.addEventListener('drop', (e) => {
                    e.preventDefault();
                    zone.classList.remove('drag-over');
                    
                    const dragging = document.querySelector('.dragging');
                    if (dragging) {
                        const cardId = dragging.dataset.id;
                        const newColumn = zone.closest('.column').dataset.column;
                        
                        const card = cards.find(c => c.id === cardId);
                        if (card && card.column !== newColumn) {
                            card.column = newColumn;
                            saveCards();
                            renderCards();
                        }
                    }
                });
            });
        }

        // Export data
        function exportData() {
            const data = JSON.stringify(cards, null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = `kanban-backup-${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            
            URL.revokeObjectURL(url);
        }

        // Close modal on outside click
        document.getElementById('cardModal').addEventListener('click', (e) => {
            if (e.target === e.currentTarget) {
                closeModal();
            }
        });
    </script>
</body>
</html>
